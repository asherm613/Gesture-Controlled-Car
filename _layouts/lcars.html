<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="/Gesture-Controlled-Car/assets/css/lcars.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Condensed:wght@300;700&display=swap" rel="stylesheet">
</head>

<body class="lcars-body">

  <div class="lcars-frame">

    <aside class="lcars-left-rail" aria-hidden="true">
      <div class="lcars-rail-block top"></div>
      <div class="lcars-rail-segment">
        <div class="lcars-pill lcars-pill-large lcars-orange">STATUS</div>
        <div class="lcars-pill lcars-pill-small lcars-purple">COMM</div>
        <div class="lcars-pill lcars-pill-small lcars-blue">NAV</div>
      </div>
      <div class="lcars-rail-block bottom"></div>
    </aside>

    <header class="lcars-header" role="banner">
      <div class="lcars-header-left">
        <div class="lcars-corner lcars-orange"></div>
        <div class="lcars-corner-right lcars-purple"></div>
      </div>
      <div class="lcars-title-wrap">
        <h1 class="lcars-title">{{ page.title }}</h1>
      </div>
      <nav class="lcars-nav" role="navigation" aria-label="Main">
        <a class="lcars-nav-item lcars-red" href="#">Home</a>
        <a class="lcars-nav-item lcars-blue" href="#">Docs</a>
        <a class="lcars-nav-item lcars-purple" href="#">Gallery</a>
      </nav>
    </header>

    <main class="lcars-content" role="main">
      {{ content }}
    </main>

    <footer class="lcars-footer" role="contentinfo">
      <div class="lcars-footer-left lcars-purple">GESTURE-CONTROLLED CAR</div>
      <div class="lcars-footer-right lcars-orange">BETA</div>
    </footer>

  </div>

</body>
</html>
